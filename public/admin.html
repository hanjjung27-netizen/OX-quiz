<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 배터리 잡콘서트 OX퀴즈 — 관리자</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --mint:#00C5A3; --mint-dark:#00A88A; --mint-light:#E8FAF5;
    --navy:#1A3A6B; --gold:#F5C842;
    --o:#FF4B4B; --x:#3B82F6; --green:#22C55E; --yellow:#F59E0B;
    --bg:#F4FDFB; --white:#FFFFFF; --sub:#6B8CA8;
    --border:#D0EDE8; --panel:#FFFFFF;
  }
  body { background:var(--bg); color:var(--navy); font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; min-height:100vh; }

  header {
    background:var(--white);
    border-bottom:2px solid var(--mint-light);
    padding:10px 24px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 8px rgba(0,197,163,0.08);
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo-wrap { display:flex; flex-direction:column; }
  .logo-title { font-size:13px; font-weight:900; color:var(--navy); line-height:1.2; }
  .logo-sub-txt { font-size:10px; color:var(--mint-dark); font-weight:700; letter-spacing:1px; }
  .logo-ox { font-size:20px; font-weight:900; }
  .logo-ox span:first-child{color:var(--o);} .logo-ox span:last-child{color:var(--x);}

  .hbadge { background:var(--mint-light); border-radius:20px; padding:5px 12px; font-size:13px; font-weight:700; color:var(--navy); border:1px solid var(--mint); }
  .hbadge em { color:var(--mint-dark); font-style:normal; }
  .phase-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 13px; border-radius:20px; font-size:12px; font-weight:700; }
  .phase-pill.waiting{background:#F0F4F8;color:var(--sub);}
  .phase-pill.active{background:#E0FAF0;color:#00875A;}
  .phase-pill.intermission{background:#FFF8E0;color:#B8860B;}
  .phase-pill.review{background:#E8F0FF;color:var(--x);}
  .phase-pill.finished{background:#E0FAF0;color:#00875A;}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .phase-pill.active .dot{animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.2;}}

  .layout { display:grid; grid-template-columns:340px 1fr; height:calc(100vh - 53px); }
  .sidebar { border-right:2px solid var(--mint-light); overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:12px; background:var(--white); }
  .main { overflow-y:auto; padding:14px 18px; display:flex; flex-direction:column; gap:12px; }

  .panel { background:var(--white); border:1.5px solid var(--border); border-radius:12px; padding:14px; box-shadow:0 2px 8px rgba(0,168,138,0.06); }
  .ptitle { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--sub); margin-bottom:10px; }

  .q-list { display:flex; flex-direction:column; gap:5px; max-height:280px; overflow-y:auto; }
  .q-item { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:9px 11px; display:flex; align-items:flex-start; gap:7px; transition:border-color .15s; }
  .q-item.current { border-color:var(--mint); background:var(--mint-light); }
  .q-item.done { opacity:.5; }
  .q-num { color:var(--sub); font-size:11px; min-width:18px; margin-top:2px; }
  .q-txt { flex:1; font-size:13px; line-height:1.4; color:var(--navy); }
  .q-ans { font-size:11px; font-weight:900; padding:2px 7px; border-radius:5px; flex-shrink:0; }
  .q-ans.O{background:#FFE8E8;color:var(--o);} .q-ans.X{background:#E8F0FF;color:var(--x);}

  textarea, input[type=text], input[type=number] {
    width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:8px;
    padding:9px 11px; color:var(--navy); font-size:13px; outline:none; font-family:inherit; transition:border-color .15s;
  }
  textarea:focus,input:focus{border-color:var(--mint);} textarea{resize:vertical;min-height:56px;}

  .ans-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:7px 0;}
  .ans-btn{padding:8px;border-radius:7px;border:2px solid var(--border);background:var(--bg);color:var(--navy);font-size:16px;font-weight:900;cursor:pointer;transition:all .15s;}
  .ans-btn.o.sel{border-color:var(--o);color:var(--o);background:#FFF0F0;}
  .ans-btn.x.sel{border-color:var(--x);color:var(--x);background:#F0F4FF;}

  .btn{padding:9px 14px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit;}
  .btn:active{transform:scale(.97);} .btn:disabled{opacity:.3;cursor:not-allowed;}
  .btn-o{background:var(--o);color:#fff;} .btn-x{background:var(--x);color:#fff;}
  .btn-mint{background:var(--mint);color:#fff;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-gray{background:#E8EEF2;color:var(--navy);}
  .btn-danger{background:#FFF0F0;color:var(--o);border:1.5px solid var(--o);}
  .btn-full{width:100%;padding:13px;}
  .row{display:flex;gap:7px;flex-wrap:wrap;}

  /* 타이머 */
  .timer-display{display:flex;align-items:center;gap:12px;margin-top:10px;}
  .timer-big{font-size:40px;font-weight:900;min-width:56px;}
  .timer-big.g{color:var(--mint-dark);} .timer-big.y{color:#E67E00;} .timer-big.r{color:var(--o);} .timer-big.off{color:var(--sub);}
  .timer-track{flex:1;height:10px;background:var(--mint-light);border-radius:5px;overflow:hidden;}
  .timer-fill{height:100%;border-radius:5px;transition:width 1s linear,background .4s;}

  /* 현재 문제 */
  .cur-q{font-size:17px;font-weight:700;line-height:1.5;word-break:keep-all;padding:14px;background:var(--bg);border-radius:9px;border-left:4px solid var(--mint);min-height:52px;color:var(--sub);}
  .cur-q.has{color:var(--navy);}
  .cur-progress{font-size:12px;color:var(--sub);margin-bottom:6px;}

  /* 통계 */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
  .sbox{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:9px;text-align:center;}
  .snum{font-size:22px;font-weight:900;color:var(--navy);} .slbl{color:var(--sub);font-size:11px;}
  .snum.o{color:var(--o);} .snum.x{color:var(--x);}
  .grow{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .glbl{font-size:16px;font-weight:900;width:22px;text-align:center;}
  .glbl.o{color:var(--o);} .glbl.x{color:var(--x);}
  .gtrack{flex:1;height:30px;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .gfill{height:100%;border-radius:6px;transition:width .6s;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-size:11px;font-weight:700;color:#fff;}
  .gfill.o{background:linear-gradient(90deg,#CC2222,var(--o));}
  .gfill.x{background:linear-gradient(90deg,#1133AA,var(--x));}
  .gpct{font-size:13px;font-weight:900;width:36px;text-align:right;color:var(--navy);}

  /* 풀이 버튼 */
  .rev-btn{padding:14px;border-radius:10px;border:none;font-size:18px;font-weight:900;cursor:pointer;transition:transform .15s;width:100%;}
  .rev-btn:hover:not(:disabled){transform:scale(1.02);}
  .rev-btn:disabled{opacity:.3;cursor:not-allowed;}
  .rev-btn.o{background:linear-gradient(135deg,var(--o),#FF7070);color:#fff;}
  .rev-btn.x{background:linear-gradient(135deg,var(--x),#60A5FA);color:#fff;}
  .rev-btn.done{background:#E8F5F0;color:var(--mint-dark);border:1.5px solid var(--mint);}

  /* 순위 / 히스토리 */
  .lb-row{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--bg);border-radius:7px;border:1.5px solid var(--border);margin-bottom:5px;}
  .lb-rank{font-size:14px;font-weight:900;width:22px;text-align:center;color:var(--navy);}
  .lb-rank.gold{color:#E6A800;} .lb-rank.silver{color:#7A8A9A;} .lb-rank.bronze{color:#B06820;}
  .lb-name{flex:1;font-size:13px;font-weight:600;color:var(--navy);}
  .lb-score{font-size:14px;font-weight:900;color:var(--mint-dark);}
  .hist-item{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:9px 11px;margin-bottom:5px;}
  .hist-q{font-size:12px;color:var(--sub);margin-bottom:4px;}
  .hist-s{display:flex;gap:9px;align-items:center;font-size:12px;}
  .hist-o{color:var(--o);font-weight:700;} .hist-x{color:var(--x);font-weight:700;}

  ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .btn-start-quiz{background:var(--mint);color:#fff;font-size:16px;padding:16px;box-shadow:0 4px 16px rgba(0,197,163,0.3);}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-ox"><span>O</span><span>X</span></div>
    <div class="logo-wrap">
      <div class="logo-title">2026 배터리 잡콘서트</div>
      <div class="logo-sub-txt">관리자 패널</div>
    </div>
    <span id="phase-pill" class="phase-pill waiting"><span class="dot"></span>대기중</span>
  </div>
  <div style="display:flex;align-items:center;gap:9px;">
    <div class="hbadge">참여자 <em id="pcount">0</em>명</div>
    <button class="btn btn-danger" onclick="confirmReset()">전체 초기화</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="panel">
      <div class="ptitle">⏱ 문제당 시간</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="number" id="timer-input" value="30" min="5" max="120" style="width:80px;text-align:center;font-size:18px;font-weight:700;">
        <span style="color:var(--sub);font-size:13px;">초</span>
        <button class="btn btn-gray" onclick="saveTimer()">저장</button>
      </div>
    </div>
    <div class="panel">
      <div class="ptitle">📋 문제 목록 <span id="q-count" style="color:var(--navy);font-size:12px;"></span></div>
      <div class="q-list" id="q-list"><div style="color:var(--sub);font-size:13px;text-align:center;padding:14px 0">아래에서 문제를 추가하세요</div></div>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:7px;">
        <!-- 엑셀 업로드 -->
        <label style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:var(--mint-light);border:1.5px dashed var(--mint);border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;color:var(--mint-dark);">
          📂 엑셀 파일 업로드 (.xlsx)
          <input type="file" id="excel-upload" accept=".xlsx,.xls" style="display:none" onchange="uploadExcel(this)">
        </label>
        <div style="color:var(--sub);font-size:11px;text-align:center;">A열: 문제 / B열: 정답(O 또는 X)</div>
        <hr style="border:none;border-top:1px solid var(--border);margin:2px 0;">
        <textarea id="new-q-text" placeholder="문제 내용 입력..." rows="2"></textarea>
        <div class="ans-row">
          <button class="ans-btn o sel" id="ans-o" onclick="selAns('O')">○ 맞다</button>
          <button class="ans-btn x" id="ans-x" onclick="selAns('X')">✕ 아니다</button>
        </div>
        <div class="row">
          <button class="btn btn-gray" style="flex:1" onclick="addQ()">+ 추가</button>
          <button class="btn btn-mint" style="flex:1" onclick="saveQ()">✓ 저장</button>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="panel">
      <div class="ptitle">🎯 퀴즈 진행</div>
      <div class="cur-progress" id="cur-progress"></div>
      <div class="cur-q" id="cur-q">대기 중 — 문제를 등록하고 퀴즈를 시작하세요</div>
      <div class="timer-display">
        <div class="timer-big off" id="timer-big">--</div>
        <div class="timer-track"><div class="timer-fill" id="timer-fill" style="width:0%;background:var(--mint)"></div></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button class="btn btn-full btn-start-quiz" id="start-btn" onclick="startQuiz()" style="flex:2;">▶ 퀴즈 시작</button>
        <button class="btn btn-danger" id="stop-btn" onclick="stopQuiz()" style="flex:1;display:none;">⏹ 중단</button>
      </div>
      <div id="quiz-controls" style="display:none;margin-top:8px;display:none;gap:8px;">
        <button class="btn btn-full" id="reveal-current-btn" onclick="revealCurrent()" style="background:var(--o);color:#fff;padding:13px;font-size:14px;font-weight:800;border-radius:10px;display:none;">📢 정답 공개</button>
        <button class="btn btn-full" id="next-q-btn" onclick="nextQuestion()" style="background:var(--navy);color:#fff;padding:13px;font-size:14px;font-weight:800;border-radius:10px;display:none;">▶ 다음 문제</button>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle">📊 실시간 집계</div>
      <div class="stats-grid">
        <div class="sbox"><div class="snum" id="s-ans">0</div><div class="slbl">응답</div></div>
        <div class="sbox"><div class="snum o" id="s-o">0</div><div class="slbl">O 선택</div></div>
        <div class="sbox"><div class="snum x" id="s-x">0</div><div class="slbl">X 선택</div></div>
      </div>
      <div class="grow"><div class="glbl o">O</div><div class="gtrack"><div class="gfill o" id="g-o" style="width:0%"><span id="go-in"></span></div></div><div class="gpct" id="go-pct">0%</div></div>
      <div class="grow"><div class="glbl x">✕</div><div class="gtrack"><div class="gfill x" id="g-x" style="width:0%"><span id="gx-in"></span></div></div><div class="gpct" id="gx-pct">0%</div></div>
    </div>

    <div class="panel" id="review-panel">
      <div class="ptitle">📖 풀이 — 정답 공개</div>
      <div id="review-q-list"><div style="color:var(--sub);font-size:13px;text-align:center;padding:14px 0">퀴즈 완료 후 여기서 정답을 공개하세요</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="panel">
        <div class="ptitle">🏆 실시간 순위</div>
        <div id="leaderboard"><div style="color:var(--sub);font-size:13px;text-align:center;padding:14px 0">순위 없음</div></div>
      </div>
      <div class="panel">
        <div class="ptitle">📝 회차 기록</div>
        <div id="history"><div style="color:var(--sub);font-size:13px;text-align:center;padding:14px 0">기록 없음</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const socket = io();
socket.emit('admin_join');
let localQ = [], selAnsVal = 'O', timerTotal = 30, roundHistory = [], currentRevealedAnswers = {};

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('ox-quiz-questions');
    if (saved) { localQ = JSON.parse(saved); renderQList(); }
    const savedTimer = localStorage.getItem('ox-quiz-timer');
    if (savedTimer) document.getElementById('timer-input').value = savedTimer;
  } catch(e) {}
}
function saveToStorage() {
  try {
    localStorage.setItem('ox-quiz-questions', JSON.stringify(localQ));
    localStorage.setItem('ox-quiz-timer', document.getElementById('timer-input').value);
  } catch(e) {}
}
loadFromStorage();

function uploadExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false });
      let added = 0;
      rows.forEach(row => {
        const text = (row[0] || '').toString().trim();
        // O/X 다양한 형태 처리 (대소문자, 특수문자 포함)
        const rawAns = (row[1] || '').toString().trim();
        let ans = '';
        if (/^[oO○]/u.test(rawAns)) ans = 'O';
        else if (/^[xX✕✗×]/u.test(rawAns)) ans = 'X';
        if (text && ans) {
          localQ.push({ text, answer: ans });
          added++;
        }
      });
      if (added > 0) {
        renderQList();
        saveToStorage();
        alert(`✓ ${added}개 문제가 등록됐어요!`);
      } else {
        alert('등록된 문제가 없어요.\nA열: 문제, B열: O 또는 X 형식인지 확인해주세요.');
      }
    } catch(err) {
      alert('파일을 읽는 중 오류가 발생했어요: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}
function selAns(a) {
  selAnsVal = a;
  document.getElementById('ans-o').classList.toggle('sel', a==='O');
  document.getElementById('ans-x').classList.toggle('sel', a==='X');
}
function addQ() {
  const text = document.getElementById('new-q-text').value.trim();
  if (!text) return;
  localQ.push({ text, answer: selAnsVal });
  document.getElementById('new-q-text').value = '';
  renderQList(); saveToStorage();
}
function delQ(i) { localQ.splice(i,1); renderQList(); saveToStorage(); }
function saveQ() { socket.emit('set_questions', { questions: localQ }); saveToStorage(); alert('✓ 저장 완료!'); }
function saveTimer() {
  const d = parseInt(document.getElementById('timer-input').value);
  if (d>=5&&d<=120) { socket.emit('set_timer', { duration: d }); saveToStorage(); }
}

function renderQList() {
  const el = document.getElementById('q-list');
  document.getElementById('q-count').textContent = localQ.length ? `(${localQ.length}문제)` : '';
  if (!localQ.length) { el.innerHTML='<div style="color:var(--sub);font-size:13px;text-align:center;padding:14px 0">아래에서 문제를 추가하세요</div>'; return; }
  el.innerHTML = localQ.map((q,i) => `
    <div class="q-item" id="qi-${i}">
      <span class="q-num">${i+1}</span>
      <span class="q-txt">${q.text}</span>
      <span class="q-ans ${q.answer}">${q.answer==='O'?'○':'✕'}</span>
      <button onclick="delQ(${i})" style="background:none;border:none;color:#AAA;cursor:pointer;font-size:13px;padding:0 2px;">✕</button>
    </div>`).join('');
}

function renderReviewPanel(history, revealedAnswers) {
  const el = document.getElementById('review-q-list');
  if (!history||!history.length) {
    el.innerHTML='<div style="color:var(--sub);font-size:13px;text-align:center;padding:14px 0">퀴즈 완료 후 여기서 정답을 공개하세요</div>';
    return;
  }

  const revealedCount = history.filter(h => revealedAnswers && revealedAnswers[h.index]).length;
  const total = history.length;
  const allRevealed = revealedCount === total;
  const nextToReveal = history.find(h => !(revealedAnswers && revealedAnswers[h.index]));

  let html = '';

  // 다음 정답 공개 버튼
  if (!allRevealed) {
    html += `
      <button class="btn btn-full" onclick="revealNextAns()" style="margin-bottom:10px;padding:14px;font-size:15px;font-weight:800;background:var(--mint);color:#fff;border-radius:10px;">
        📢 다음 정답 공개 (${revealedCount+1}/${total})
      </button>`;
  } else {
    html += `
      <div style="margin-bottom:10px;padding:14px;font-size:14px;font-weight:800;background:var(--mint-light);color:var(--mint-dark);border-radius:10px;text-align:center;border:1.5px solid var(--mint);">
        ✓ 전체 정답 공개 완료
      </div>`;
  }

  // 문제 목록
  html += history.map((h,i) => {
    const revealed = revealedAnswers && revealedAnswers[h.index];
    return `<div style="background:var(--bg);border:1.5px solid ${revealed?'var(--mint)':'var(--border)'};border-radius:8px;padding:10px 12px;margin-bottom:6px;opacity:${revealed?1:0.5};">
      <div style="font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--navy);">
        ${i+1}. ${h.question}
        ${revealed ? `<span style="font-size:11px;background:var(--mint-light);color:var(--mint-dark);padding:2px 8px;border-radius:6px;font-weight:700;border:1px solid var(--mint);flex-shrink:0;">공개됨 ${h.answer==='O'?'○':'✕'}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  el.innerHTML = html;
}

function revealNextAns() {
  const nextItem = roundHistory.find(h => !(currentRevealedAnswers && currentRevealedAnswers[h.index]));
  if (nextItem) socket.emit('reveal_answer', { index: nextItem.index });
}

function stopQuiz() {
  if (!confirm('퀴즈를 중단할까요? 지금까지의 점수는 유지됩니다.')) return;
  socket.emit('stop_quiz');
}
function revealCurrent() { socket.emit('reveal_current'); }
function nextQuestion() { socket.emit('next_question'); }

function startQuiz() {
  if (!localQ.length) { alert('문제를 먼저 등록해주세요!'); return; }
  if (!confirm(`총 ${localQ.length}문제로 퀴즈를 시작할까요?`)) return;
  const d = parseInt(document.getElementById('timer-input').value)||30;
  socket.emit('set_timer', { duration: d });
  socket.emit('set_questions', { questions: localQ });
  setTimeout(() => socket.emit('start_quiz'), 300);
}
function revealAns(index) { socket.emit('reveal_answer', { index }); }
function confirmReset() {
  if (confirm('⚠️ 전체 초기화하면 참여자, 점수, 기록이 모두 삭제됩니다. 계속할까요?')) socket.emit('full_reset');
}

function setTimerDisplay(remaining, total) {
  timerTotal = total||timerTotal;
  const big = document.getElementById('timer-big');
  const fill = document.getElementById('timer-fill');
  if (remaining < 0) { big.textContent='--'; big.className='timer-big off'; fill.style.width='0%'; return; }
  big.textContent = remaining;
  fill.style.width = (remaining/timerTotal*100)+'%';
  if (remaining<=0){big.className='timer-big off';fill.style.background='var(--sub)';}
  else if(remaining<=5){big.className='timer-big r';fill.style.background='var(--o)';}
  else if(remaining<=10){big.className='timer-big y';fill.style.background='var(--yellow)';}
  else{big.className='timer-big g';fill.style.background='var(--mint)';}
}

socket.on('timer_tick', ({remaining,total}) => setTimerDisplay(remaining,total));

socket.on('admin_update', (data) => {
  document.getElementById('pcount').textContent = data.participantCount;
  const phases = { waiting:['대기중','waiting'], active:['진행중','active'], intermission:['전환중','intermission'], review:['풀이중','review'], finished:['완료','finished'] };
  const [txt,cls] = phases[data.phase]||phases.waiting;
  const pill = document.getElementById('phase-pill');
  pill.className = `phase-pill ${cls}`;
  pill.innerHTML = `<span class="dot"></span>${txt}`;

  const cq = document.getElementById('cur-q');
  const cp = document.getElementById('cur-progress');
  if (data.currentQuestion) {
    cq.textContent = data.currentQuestion.text; cq.className = 'cur-q has';
    cp.textContent = `${data.currentIndex+1} / ${data.totalQuestions}번째 문제`;
  } else { cq.textContent = '대기 중 — 문제를 등록하고 퀴즈를 시작하세요'; cq.className = 'cur-q'; cp.textContent = ''; }

  if (data.timerDuration) { timerTotal = data.timerDuration; document.getElementById('timer-input').value = data.timerDuration; }

  const sb = document.getElementById('start-btn');
  const stopBtn = document.getElementById('stop-btn');
  const revealBtn = document.getElementById('reveal-current-btn');
  const nextBtn = document.getElementById('next-q-btn');

  if (data.quizRunning && data.phase === 'active') {
    sb.textContent='진행중...'; sb.disabled=true;
    stopBtn.style.display='block';
    revealBtn.style.display='none';
    nextBtn.style.display='none';
  } else if (data.phase === 'intermission') {
    sb.textContent='진행중...'; sb.disabled=true;
    stopBtn.style.display='block';
    const alreadyRevealed = data.revealedAnswers && data.revealedAnswers[data.currentIndex];
    revealBtn.style.display = alreadyRevealed ? 'none' : 'block';
    nextBtn.style.display = alreadyRevealed ? 'block' : 'none';
  } else if (data.phase === 'finished') {
    sb.textContent='▶ 다시 시작'; sb.disabled=false;
    stopBtn.style.display='none';
    revealBtn.style.display='none';
    nextBtn.style.display='none';
  } else {
    sb.textContent='▶ 퀴즈 시작'; sb.disabled=false;
    stopBtn.style.display='none';
    revealBtn.style.display='none';
    nextBtn.style.display='none';
  }

  document.querySelectorAll('[id^="qi-"]').forEach((el,i) => {
    el.classList.toggle('current', i===data.currentIndex && data.quizRunning);
    el.classList.toggle('done', i<data.currentIndex);
  });

  const {oCount,xCount,answered} = data.stats;
  document.getElementById('s-ans').textContent = answered;
  document.getElementById('s-o').textContent = oCount;
  document.getElementById('s-x').textContent = xCount;
  const tot = oCount+xCount||1;
  const op=Math.round(oCount/tot*100), xp=Math.round(xCount/tot*100);
  document.getElementById('g-o').style.width=op+'%';
  document.getElementById('g-x').style.width=xp+'%';
  document.getElementById('go-pct').textContent=op+'%';
  document.getElementById('gx-pct').textContent=xp+'%';
  document.getElementById('go-in').textContent=oCount>0?oCount+'명':'';
  document.getElementById('gx-in').textContent=xCount>0?xCount+'명':'';

  roundHistory = data.roundHistory||[];
  currentRevealedAnswers = data.revealedAnswers||{};
  renderReviewPanel(roundHistory, currentRevealedAnswers);
  const lb = document.getElementById('leaderboard');
  const rc=['gold','silver','bronze'], re=['🥇','🥈','🥉'];
  lb.innerHTML = data.leaderboard?.length
    ? data.leaderboard.map((p,i)=>`<div class="lb-row"><div class="lb-rank ${rc[i]||''}">${re[i]||i+1}</div><div class="lb-name">${p.name}</div><div class="lb-score">${p.score}점</div></div>`).join('')
    : '<div style="color:var(--sub);font-size:13px;text-align:center;padding:14px 0">순위 없음</div>';

  const hl = document.getElementById('history');
  hl.innerHTML = roundHistory.length
    ? [...roundHistory].reverse().map((h,i)=>`<div class="hist-item"><div class="hist-q">${roundHistory.length-i}번 · ${h.question}</div><div class="hist-s"><span class="hist-o">○ ${h.oCount}</span><span class="hist-x">✕ ${h.xCount}</span></div></div>`).join('')
    : '<div style="color:var(--sub);font-size:13px;text-align:center;padding:14px 0">기록 없음</div>';
});

socket.on('full_reset', () => { localQ=[]; renderQList(); setTimerDisplay(-1,timerTotal); renderReviewPanel([]); });
</script>
</body>
</html>
