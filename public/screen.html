<!DOCTYPE html>
<html lang="ko" style="background:#F4FDFB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 배터리 잡콘서트 OX퀴즈</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --mint:#00C5A3; --mint-dark:#00A88A; --mint-light:#E8FAF5;
    --navy:#1A3A6B; --gold:#F5C842;
    --o:#FF4B4B; --x:#3B82F6; --green:#22C55E; --yellow:#F59E0B;
    --bg:#F4FDFB; --white:#FFFFFF; --sub:#6B8CA8; --border:#D0EDE8;
  }
  html { background:#F4FDFB !important; }
  html, body {
    background: #F4FDFB;
    color: var(--navy);
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .screen { display:none; width:100%; height:100%; flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:40px; }
  .screen.active { display:flex; }

  /* ── 대기 화면 ── */
  .wait-card {
    background: var(--white);
    border-radius: 32px;
    padding: 44px 64px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(26,58,107,0.25), 0 4px 16px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .wait-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: var(--mint-light);
    border-radius: 50%;
    opacity: 0.5;
  }
  .wait-card::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -30px;
    width: 120px; height: 120px;
    background: #E8F4FD;
    border-radius: 50%;
    opacity: 0.6;
  }
  .wait-year { font-size:clamp(20px,2vw,26px); font-weight:700; color:var(--mint-dark); letter-spacing:2px; margin-bottom:4px; }
  .wait-title { font-size:clamp(32px,4.5vw,56px); font-weight:900; color:var(--navy); line-height:1.25; margin-bottom:12px; }
  .wait-subtitle {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: clamp(16px,1.8vw,22px);
    font-weight: 800;
    padding: 8px 24px;
    border-radius: 50px;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .wait-qr {
    width: clamp(120px, 14vw, 180px);
    height: clamp(120px, 14vw, 180px);
    margin-bottom: 16px;
    border-radius: 12px;
    border: 3px solid var(--mint-light);
    padding: 6px;
    background: white;
  }
  .wait-url-box {
    background: var(--navy);
    color: var(--white);
    border-radius: 14px;
    padding: 12px 28px;
    font-size:clamp(16px,1.7vw,22px);
    font-weight:700;
    letter-spacing:1px;
    display:inline-block;
    margin-bottom: 8px;
  }
  .wait-url-sub { font-size:clamp(13px,1.3vw,16px); color:var(--sub); }

  /* 배경 장식 */
  .deco { position:fixed; pointer-events:none; font-size:80px; opacity:0.12; }
  .deco-1 { top:5%; left:3%; transform:rotate(-20deg); }
  .deco-2 { bottom:8%; right:4%; transform:rotate(15deg); }
  .deco-3 { top:40%; left:1%; font-size:50px; opacity:0.1; }
  .deco-4 { bottom:30%; right:2%; font-size:50px; opacity:0.1; }

  /* ── 퀴즈 진행 화면 ── */
  .q-header { display:flex; align-items:center; gap:16px; width:100%; }
  .q-badge {
    background: var(--navy);
    color: var(--white);
    font-size:18px; font-weight:900;
    padding:8px 22px; border-radius:30px;
  }
  .q-count { color:var(--navy); font-size:18px; font-weight:700; opacity:0.6; }
  .q-text {
    font-size:clamp(26px,3.2vw,44px); font-weight:800;
    text-align:center; line-height:1.45; word-break:keep-all;
    padding:36px 48px;
    background: var(--white);
    border-radius:24px;
    width:100%;
    color: var(--navy);
    box-shadow: 0 8px 24px rgba(26,58,107,0.15);
    border: 2px solid var(--border);
  }

  /* 타이머 */
  .timer-section { width:100%; display:flex; align-items:center; gap:20px; }
  .timer-big { font-size:72px; font-weight:900; min-width:100px; text-align:center; }
  .timer-big.g { color:var(--navy); }
  .timer-big.y { color:#E67E00; }
  .timer-big.r { color:var(--o); animation:shake .1s infinite; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 50%{transform:translateX(4px);} }
  .timer-track { flex:1; height:16px; background:var(--mint-light); border-radius:8px; overflow:hidden; }
  .timer-fill { height:100%; border-radius:8px; transition:width 1s linear, background .5s; }

  /* 통계 */
  .stats-row { display:flex; gap:16px; width:100%; justify-content:center; }
  .stat-box { background:var(--white); border-radius:16px; padding:16px 32px; text-align:center; box-shadow:0 4px 12px rgba(26,58,107,0.12); }
  .stat-num { font-size:36px; font-weight:900; color:var(--navy); }
  .stat-lbl { color:var(--sub); font-size:14px; margin-top:4px; font-weight:600; }
  .stat-num.o { color:var(--o); } .stat-num.x { color:var(--x); }

  /* 그래프 */
  .graph-section { width:100%; display:flex; flex-direction:column; gap:14px; }
  .graph-row { display:flex; align-items:center; gap:16px; }
  .graph-lbl { font-size:36px; font-weight:900; width:48px; text-align:center; }
  .graph-lbl.o { color:var(--o); } .graph-lbl.x { color:var(--x); }
  .graph-track { flex:1; height:56px; background:var(--mint-light); border-radius:12px; overflow:hidden; }
  .graph-fill { height:100%; border-radius:12px; transition:width .6s cubic-bezier(.4,0,.2,1); display:flex; align-items:center; justify-content:flex-end; padding-right:16px; font-size:20px; font-weight:800; color:#fff; }
  .graph-fill.o { background:linear-gradient(90deg,#CC2222,var(--o)); }
  .graph-fill.x { background:linear-gradient(90deg,#1133AA,var(--x)); }
  .graph-pct { font-size:24px; font-weight:900; width:60px; text-align:right; color:var(--navy); }
  .graph-cnt { font-size:18px; color:var(--navy); opacity:0.6; width:60px; text-align:right; }

  /* 정답 공개 */
  .reveal-section { width:100%; display:flex; flex-direction:column; align-items:center; gap:24px; }
  .reveal-card { background:var(--white); border-radius:32px; padding:40px 60px; text-align:center; width:100%; box-shadow:0 12px 40px rgba(26,58,107,0.2); }
  .reveal-q { font-size:20px; color:var(--sub); margin-bottom:16px; font-weight:600; }
  .reveal-answer { font-size:100px; font-weight:900; animation:popIn .5s cubic-bezier(.34,1.56,.64,1); line-height:1; }
  .reveal-answer.O { color:var(--o); }
  .reveal-answer.X { color:var(--x); }
  .reveal-label { font-size:30px; font-weight:800; margin-top:8px; }
  .reveal-label.O { color:var(--o); } .reveal-label.X { color:var(--x); }
  .correct-count { font-size:20px; color:var(--green); font-weight:700; margin-top:8px; }
  .reveal-bars { width:100%; }

  /* 최종 순위 */
  .finish-card { background:var(--white); border-radius:32px; padding:36px 48px; width:100%; box-shadow:0 12px 40px rgba(26,58,107,0.2); }
  .finish-title { font-size:42px; font-weight:900; color:var(--navy); text-align:center; margin-bottom:24px; }
  .lb-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:10px; max-height:55vh; overflow-y:auto; }
  .lb-row { display:flex; align-items:center; gap:14px; padding:12px 18px; background:var(--white); border-radius:12px; border:1.5px solid var(--border); }
  .lb-rank { font-size:20px; font-weight:900; width:34px; text-align:center; color:var(--navy); }
  .lb-rank.gold{color:#E6A800;} .lb-rank.silver{color:#7A8A9A;} .lb-rank.bronze{color:#B06820;}
  .lb-name { flex:1; font-size:18px; font-weight:700; color:var(--navy); }
  .lb-score { font-size:18px; font-weight:900; color:var(--mint-dark); }

  @keyframes popIn { 0%{transform:scale(.2);opacity:0;} 100%{transform:scale(1);opacity:1;} }
</style>
</head>

<script>
const socket = io();
socket.emit('screen_join');
let timerTotal = 30;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateGraph(oCount, xCount) {
  const tot = oCount + xCount || 1;
  const op = Math.round(oCount/tot*100), xp = Math.round(xCount/tot*100);
  document.getElementById('g-o').style.width = op+'%';
  document.getElementById('g-x').style.width = xp+'%';
  document.getElementById('g-o-pct').textContent = op+'%';
  document.getElementById('g-x-pct').textContent = xp+'%';
  document.getElementById('g-o-cnt').textContent = oCount+'명';
  document.getElementById('g-x-cnt').textContent = xCount+'명';
  document.getElementById('s-total').textContent = oCount+xCount;
  document.getElementById('s-o').textContent = oCount;
  document.getElementById('s-x').textContent = xCount;
}

function setTimer(remaining, total) {
  timerTotal = total || timerTotal;
  const big = document.getElementById('timer-big');
  const fill = document.getElementById('timer-fill');
  big.textContent = remaining;
  fill.style.width = (remaining/timerTotal*100)+'%';
  if (remaining<=5){ big.className='timer-big r'; fill.style.background='var(--o)'; }
  else if(remaining<=10){ big.className='timer-big y'; fill.style.background='#E67E00'; }
  else{ big.className='timer-big g'; fill.style.background='var(--navy)'; }
}

socket.on('screen_update', (data) => {
  if (data.phase === 'waiting') { show('s-wait'); return; }
  if (data.phase === 'finished') { showFinish(data.leaderboard); return; }
  if (data.phase === 'intermission') return; // 집계 화면 유지
  if (data.currentQuestion) {
    document.getElementById('q-text').textContent = data.currentQuestion.text;
    document.getElementById('q-count').textContent = `${data.currentQuestion.index+1} / ${data.currentQuestion.total}`;
    updateGraph(data.stats.oCount, data.stats.xCount);
    if (data.timerRemaining > 0) setTimer(data.timerRemaining, data.timerDuration);
    if (document.getElementById('s-reveal').classList.contains('active')) return;
    show('s-quiz');
  }
});

socket.on('timer_tick', ({remaining, total}) => {
  if (document.getElementById('s-quiz').classList.contains('active')) setTimer(remaining, total);
});

socket.on('question_start', ({ text, index, total, timerDuration }) => {
  timerTotal = timerDuration || 30;
  document.getElementById('q-text').textContent = text;
  document.getElementById('q-count').textContent = `${index+1} / ${total}`;
  updateGraph(0, 0);
  setTimer(timerTotal, timerTotal);
  show('s-quiz');
});

socket.on('answer_reveal', ({ questionText, correctAnswer, oCount, xCount, correctCount }) => {
  document.getElementById('rev-q').textContent = questionText;
  document.getElementById('rev-ans').textContent = correctAnswer === 'O' ? '○' : '✕';
  document.getElementById('rev-ans').className = 'reveal-answer ' + correctAnswer;
  document.getElementById('rev-label').textContent = correctAnswer === 'O' ? '맞다!' : '아니다!';
  document.getElementById('rev-label').className = 'reveal-label ' + correctAnswer;
  document.getElementById('rev-correct').textContent = `✓ 정답자 ${correctCount}명`;
  const tot = oCount+xCount||1;
  const op=Math.round(oCount/tot*100), xp=Math.round(xCount/tot*100);
  document.getElementById('rg-o').style.width=op+'%';
  document.getElementById('rg-x').style.width=xp+'%';
  document.getElementById('rg-o-pct').textContent=op+'%';
  document.getElementById('rg-x-pct').textContent=xp+'%';
  document.getElementById('rg-o-cnt').textContent=oCount+'명';
  document.getElementById('rg-x-cnt').textContent=xCount+'명';
  show('s-reveal');
});

socket.on('intermission', ({ isLast }) => {
  if (!isLast) show('s-quiz');
});

socket.on('quiz_finished', ({ leaderboard }) => showFinish(leaderboard));

function showFinish(lb) {
  const rc=['gold','silver','bronze'], re=['🥇','🥈','🥉'];
  document.getElementById('lb-grid').innerHTML = (lb||[]).map((p,i) => `
    <div class="lb-row">
      <div class="lb-rank ${rc[i]||''}">${re[i]||i+1}</div>
      <div class="lb-name">${p.name}</div>
      <div class="lb-score">${p.score}점</div>
    </div>`).join('');
  show('s-finish');
}

socket.on('reveal_all_answers', ({ answers }) => {
  const existing = document.getElementById('s-all');
  if (existing) existing.remove();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const tmp = document.createElement('div');
  tmp.id = 's-all';
  tmp.style.cssText = 'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px;background:#F4FDFB;overflow:auto;z-index:999;';
  const title = document.createElement('div');
  title.style.cssText = 'font-size:clamp(22px,2.8vw,36px);font-weight:900;color:#1A3A6B;';
  title.textContent = '📋 전체 정답';
  tmp.appendChild(title);
  const grid = document.createElement('div');
  grid.style.cssText = 'width:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;';
  answers.forEach((a, i) => {
    const card = document.createElement('div');
    card.style.cssText = 'background:white;border-radius:16px;padding:18px 20px;border:2px solid ' + (a.correctAnswer==='O'?'#FFD0D0':'#D0DCFF') + ';box-shadow:0 4px 12px rgba(26,58,107,0.08);';
    card.innerHTML = '<div style="font-size:13px;color:#6B8CA8;margin-bottom:6px;font-weight:700;">' + (i+1) + '번</div>' +
      '<div style="font-size:15px;font-weight:700;color:#1A3A6B;margin-bottom:10px;line-height:1.4;">' + a.questionText + '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:28px;font-weight:900;color:' + (a.correctAnswer==='O'?'#FF4B4B':'#3B82F6') + ';">' + (a.correctAnswer==='O'?'○':'✕') + '</span>' +
        '<span style="font-size:12px;color:#6B8CA8;">정답자 <strong style=\"color:#22C55E;\">' + a.correctCount + '명</strong> · O ' + a.oCount + ' / X ' + a.xCount + '</span>' +
      '</div>';
    grid.appendChild(card);
  });
  tmp.appendChild(grid);
  document.body.appendChild(tmp);
});

socket.on('full_reset', () => {
  const existing = document.getElementById('s-all');
  if (existing) existing.remove();
  show('s-wait');
});
</script>
</body>
</html>
