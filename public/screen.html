<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OX 퀴즈 스크린</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --o:#FF4B4B; --x:#3B82F6; --bg:#0A0A0F; --surface:#14141C; --text:#F0F0F8; --sub:#6666AA; --green:#22C55E; --yellow:#F59E0B; }
  body { background:var(--bg); color:var(--text); font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; overflow:hidden; }

  .screen { display:none; width:100%; max-width:1200px; flex-direction:column; align-items:center; gap:32px; }
  .screen.active { display:flex; }

  /* 대기 */
  .wait-logo { font-size:120px; font-weight:900; letter-spacing:-6px; }
  .wait-logo span:first-child { color:var(--o); } .wait-logo span:last-child { color:var(--x); }
  .wait-url { font-size:28px; color:var(--sub); letter-spacing:2px; }
  .wait-sub { font-size:20px; color:var(--sub); }
  .pulse { animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

  /* 퀴즈 진행 */
  .q-header { display:flex; align-items:center; gap:20px; width:100%; }
  .q-badge { background:var(--o); color:#fff; font-size:18px; font-weight:900; padding:8px 20px; border-radius:30px; }
  .q-count { color:var(--sub); font-size:18px; }
  .q-text { font-size:clamp(28px,3.5vw,48px); font-weight:800; text-align:center; line-height:1.4; word-break:keep-all; padding:40px 48px; background:var(--surface); border-radius:24px; width:100%; }

  /* 타이머 */
  .timer-section { width:100%; display:flex; align-items:center; gap:20px; }
  .timer-big { font-size:72px; font-weight:900; min-width:100px; text-align:center; }
  .timer-big.g { color:var(--green); } .timer-big.y { color:var(--yellow); } .timer-big.r { color:var(--o); animation:shake .1s infinite; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 50%{transform:translateX(4px);} }
  .timer-track { flex:1; height:16px; background:#2A2A35; border-radius:8px; overflow:hidden; }
  .timer-fill { height:100%; border-radius:8px; transition:width 1s linear, background .5s; }

  /* 집계 그래프 */
  .graph-section { width:100%; display:flex; flex-direction:column; gap:16px; }
  .graph-row { display:flex; align-items:center; gap:16px; }
  .graph-lbl { font-size:36px; font-weight:900; width:48px; text-align:center; }
  .graph-lbl.o { color:var(--o); } .graph-lbl.x { color:var(--x); }
  .graph-track { flex:1; height:56px; background:var(--surface); border-radius:12px; overflow:hidden; }
  .graph-fill { height:100%; border-radius:12px; transition:width .6s cubic-bezier(.4,0,.2,1); display:flex; align-items:center; justify-content:flex-end; padding-right:16px; font-size:20px; font-weight:800; color:rgba(255,255,255,.9); }
  .graph-fill.o { background:linear-gradient(90deg,#AA2222,var(--o)); }
  .graph-fill.x { background:linear-gradient(90deg,#1133AA,var(--x)); }
  .graph-pct { font-size:24px; font-weight:900; width:60px; text-align:right; }
  .graph-cnt { font-size:18px; color:var(--sub); width:60px; text-align:right; }

  .stats-row { display:flex; gap:16px; width:100%; justify-content:center; }
  .stat-box { background:var(--surface); border-radius:16px; padding:16px 32px; text-align:center; }
  .stat-num { font-size:36px; font-weight:900; }
  .stat-lbl { color:var(--sub); font-size:14px; margin-top:4px; }
  .stat-num.o { color:var(--o); } .stat-num.x { color:var(--x); }

  /* 정답 공개 */
  .reveal-section { width:100%; display:flex; flex-direction:column; align-items:center; gap:24px; }
  .reveal-q { font-size:22px; color:var(--sub); text-align:center; }
  .reveal-answer { font-size:96px; font-weight:900; animation:popIn .5s cubic-bezier(.34,1.56,.64,1); }
  .reveal-answer.O { color:var(--o); } .reveal-answer.X { color:var(--x); }
  .reveal-label { font-size:28px; font-weight:700; }
  .reveal-label.O { color:var(--o); } .reveal-label.X { color:var(--x); }
  .correct-count { font-size:20px; color:var(--green); }

  /* 최종 순위 */
  .finish-title { font-size:48px; font-weight:900; }
  .lb-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:12px; max-height:60vh; overflow-y:auto; }
  .lb-row { display:flex; align-items:center; gap:14px; padding:14px 20px; background:var(--surface); border-radius:14px; }
  .lb-rank { font-size:22px; font-weight:900; width:36px; text-align:center; }
  .lb-rank.gold{color:#F59E0B;} .lb-rank.silver{color:#9CA3AF;} .lb-rank.bronze{color:#CD7C2F;}
  .lb-name { flex:1; font-size:20px; font-weight:700; }
  .lb-score { font-size:20px; font-weight:900; color:var(--green); }

  @keyframes popIn { 0%{transform:scale(.2);opacity:0;} 100%{transform:scale(1);opacity:1;} }
</style>
</head>
<body>

<!-- 대기 -->
<div class="screen active" id="s-wait">
  <div class="wait-logo pulse"><span>O</span><span>X</span></div>
  <div class="wait-url">ox-quiz.onrender.com</div>
  <div class="wait-sub">스마트폰으로 접속하세요</div>
</div>

<!-- 퀴즈 진행 -->
<div class="screen" id="s-quiz">
  <div class="q-header">
    <div class="q-badge">Q</div>
    <div class="q-count" id="q-count"></div>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="timer-section">
    <div class="timer-big g" id="timer-big">30</div>
    <div class="timer-track"><div class="timer-fill" id="timer-fill" style="width:100%;background:var(--green)"></div></div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">응답</div></div>
    <div class="stat-box"><div class="stat-num o" id="s-o">0</div><div class="stat-lbl">O 선택</div></div>
    <div class="stat-box"><div class="stat-num x" id="s-x">0</div><div class="stat-lbl">X 선택</div></div>
  </div>
  <div class="graph-section">
    <div class="graph-row">
      <div class="graph-lbl o">O</div>
      <div class="graph-track"><div class="graph-fill o" id="g-o" style="width:0%"></div></div>
      <div class="graph-pct" id="g-o-pct">0%</div>
      <div class="graph-cnt" id="g-o-cnt">0명</div>
    </div>
    <div class="graph-row">
      <div class="graph-lbl x">✕</div>
      <div class="graph-track"><div class="graph-fill x" id="g-x" style="width:0%"></div></div>
      <div class="graph-pct" id="g-x-pct">0%</div>
      <div class="graph-cnt" id="g-x-cnt">0명</div>
    </div>
  </div>
</div>

<!-- 정답 공개 -->
<div class="screen" id="s-reveal">
  <div class="reveal-section">
    <div class="reveal-q" id="rev-q"></div>
    <div class="reveal-answer" id="rev-ans"></div>
    <div class="reveal-label" id="rev-label"></div>
    <div class="correct-count" id="rev-correct"></div>
  </div>
  <div class="graph-section" style="margin-top:16px;">
    <div class="graph-row">
      <div class="graph-lbl o">O</div>
      <div class="graph-track"><div class="graph-fill o" id="rg-o" style="width:0%"></div></div>
      <div class="graph-pct" id="rg-o-pct">0%</div>
      <div class="graph-cnt" id="rg-o-cnt">0명</div>
    </div>
    <div class="graph-row">
      <div class="graph-lbl x">✕</div>
      <div class="graph-track"><div class="graph-fill x" id="rg-x" style="width:0%"></div></div>
      <div class="graph-pct" id="rg-x-pct">0%</div>
      <div class="graph-cnt" id="rg-x-cnt">0명</div>
    </div>
  </div>
</div>

<!-- 최종 순위 -->
<div class="screen" id="s-finish">
  <div class="finish-title">🏆 최종 순위</div>
  <div class="lb-grid" id="lb-grid"></div>
</div>

<script>
const socket = io();
socket.emit('screen_join');

let timerTotal = 30;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateGraph(oCount, xCount) {
  const tot = oCount + xCount || 1;
  const op = Math.round(oCount/tot*100), xp = Math.round(xCount/tot*100);
  document.getElementById('g-o').style.width = op+'%';
  document.getElementById('g-x').style.width = xp+'%';
  document.getElementById('g-o-pct').textContent = op+'%';
  document.getElementById('g-x-pct').textContent = xp+'%';
  document.getElementById('g-o-cnt').textContent = oCount+'명';
  document.getElementById('g-x-cnt').textContent = xCount+'명';
  document.getElementById('s-total').textContent = oCount+xCount;
  document.getElementById('s-o').textContent = oCount;
  document.getElementById('s-x').textContent = xCount;
}

function setTimer(remaining, total) {
  timerTotal = total || timerTotal;
  const big = document.getElementById('timer-big');
  const fill = document.getElementById('timer-fill');
  big.textContent = remaining;
  fill.style.width = (remaining/timerTotal*100)+'%';
  if (remaining<=5){big.className='timer-big r';fill.style.background='var(--o)';}
  else if(remaining<=10){big.className='timer-big y';fill.style.background='var(--yellow)';}
  else{big.className='timer-big g';fill.style.background='var(--green)';}
}

socket.on('screen_update', (data) => {
  if (data.phase === 'waiting') { show('s-wait'); return; }
  if (data.phase === 'finished') { showFinish(data.leaderboard); return; }
  if (data.phase === 'intermission' && !data.quizRunning) { showFinish(data.leaderboard); return; }
  if (data.currentQuestion) {
    document.getElementById('q-text').textContent = data.currentQuestion.text;
    document.getElementById('q-count').textContent = `${data.currentQuestion.index+1} / ${data.currentQuestion.total}`;
    updateGraph(data.stats.oCount, data.stats.xCount);
    if (data.timerRemaining > 0) setTimer(data.timerRemaining, data.timerDuration);
    if (document.getElementById('s-reveal').classList.contains('active')) return;
    show('s-quiz');
  }
});

socket.on('timer_tick', ({remaining, total}) => {
  if (document.getElementById('s-quiz').classList.contains('active')) setTimer(remaining, total);
});

socket.on('question_start', ({ text, index, total, timerDuration }) => {
  timerTotal = timerDuration || 30;
  document.getElementById('q-text').textContent = text;
  document.getElementById('q-count').textContent = `${index+1} / ${total}`;
  updateGraph(0, 0);
  setTimer(timerTotal, timerTotal);
  show('s-quiz');
});

socket.on('answer_reveal', ({ questionText, correctAnswer, oCount, xCount, correctCount }) => {
  document.getElementById('rev-q').textContent = questionText;
  document.getElementById('rev-ans').textContent = correctAnswer === 'O' ? '○' : '✕';
  document.getElementById('rev-ans').className = 'reveal-answer ' + correctAnswer;
  document.getElementById('rev-label').textContent = correctAnswer === 'O' ? '맞다!' : '아니다!';
  document.getElementById('rev-label').className = 'reveal-label ' + correctAnswer;
  document.getElementById('rev-correct').textContent = `✓ 정답자 ${correctCount}명`;
  const tot = oCount+xCount||1;
  const op=Math.round(oCount/tot*100), xp=Math.round(xCount/tot*100);
  document.getElementById('rg-o').style.width=op+'%';
  document.getElementById('rg-x').style.width=xp+'%';
  document.getElementById('rg-o-pct').textContent=op+'%';
  document.getElementById('rg-x-pct').textContent=xp+'%';
  document.getElementById('rg-o-cnt').textContent=oCount+'명';
  document.getElementById('rg-x-cnt').textContent=xCount+'명';
  show('s-reveal');
});

// 실시간 집계 업데이트
socket.on('admin_update', () => {});

socket.on('intermission', ({ isLast }) => {
  if (!isLast) show('s-quiz');
});

socket.on('quiz_finished', ({ leaderboard }) => showFinish(leaderboard));

function showFinish(lb) {
  const rc=['gold','silver','bronze'], re=['🥇','🥈','🥉'];
  document.getElementById('lb-grid').innerHTML = (lb||[]).map((p,i) => `
    <div class="lb-row">
      <div class="lb-rank ${rc[i]||''}">${re[i]||i+1}</div>
      <div class="lb-name">${p.name}</div>
      <div class="lb-score">${p.score}점</div>
    </div>`).join('');
  show('s-finish');
}

socket.on('full_reset', () => show('s-wait'));
</script>
</body>
</html>
